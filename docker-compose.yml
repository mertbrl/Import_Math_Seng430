version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "7860:7860"
    environment:
      - APP_ENV=production
      - PORT=7860
      - CORS_ORIGINS=["http://localhost:3000","http://localhost:5173","http://127.0.0.1:5173"]
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:7860/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  frontend:
    build:
      context: ./frontend-app
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:7860/api/v1
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
